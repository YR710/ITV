name: Release CI

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: '发布类型'
        required: true
        default: 'beta'
        type: choice
        options:
          - stable
          - beta
          - dev

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写入 release

    steps:
      - name: Set branch by release_type
        id: set_branch
        run: |
          if [ "${{ github.event.inputs.release_type }}" = "stable" ]; then
            echo "branch=main" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.release_type }}" = "beta" ]; then
            echo "branch=beta" >> $GITHUB_ENV
          else
            echo "branch=dev" >> $GITHUB_ENV
          fi

      - name: Checkout code from current repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.branch }}
          fetch-depth: 0
          submodules: 'recursive'
          # 不指定 repository 即使用当前仓库，无需私有 token

      # ---------- 新增：替换默认直播源地址 ----------
      - name: Replace default source URL with https://itv.19860519.xyz/output/tv.m3u
        run: |
          echo "开始替换默认源地址..."
          # 常见默认源定义位置（根据天光云影项目结构推测）
          # 尝试在 strings.xml / Constants.kt / SourceManager.kt 等文件中查找并替换
          # 下面的命令会扫描所有 .xml, .kt, .java 文件，将常见默认源 URL 替换为目标地址
          find . -type f \( -name "*.xml" -o -name "*.kt" -o -name "*.java" \) -print0 | xargs -0 sed -i \
            -e 's|https\?://[^"]*default[^"]*\.m3u[^"]*|https://itv.19860519.xyz/output/tv.m3u|g' \
            -e 's|https\?://[^"]*source[^"]*\.m3u[^"]*|https://itv.19860519.xyz/output/tv.m3u|g' \
            -e 's|"default_live_url"[[:space:]]*:[[:space:]]*"[^"]*"|"default_live_url":"https://itv.19860519.xyz/output/tv.m3u"|g' \
            -e 's|DEFAULT_SOURCE_URL[[:space:]]*=[[:space:]]*"[^"]*"|DEFAULT_SOURCE_URL = "https://itv.19860519.xyz/output/tv.m3u"|g'
          
          # 针对 res/values/strings.xml 中可能存在的 <string name="default_source">xxx</string>
          sed -i 's|<string name="default_source">.*</string>|<string name="default_source">https://itv.19860519.xyz/output/tv.m3u</string>|g' \
            app/src/main/res/values/strings.xml 2>/dev/null || true
          
          echo "替换完成，检查修改："
          grep -r "itv.19860519.xyz" --include="*.kt" --include="*.xml" --include="*.java" . || echo "未找到目标字符串，请确认源码中的默认源定义位置"
      # -------------------------------------------------

      - name: Init Empty Changelog
        run: |
          {
            echo "changelog<<EOF"
            echo "## Changelog"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Get changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_ENV
          cat change.log >> $GITHUB_ENV || true
          echo "EOF" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          dependency-graph: generate-and-submit
          cache-overwrite-existing: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Add signing properties (Optional)
        if: secrets.SIGNING_PROPERTIES != ''
        run: |
          echo "${{ secrets.SIGNING_PROPERTIES }}" | base64 -d > signing.properties

      - name: Add jks file (Optional)
        if: secrets.SIGN_KEY != ''
        run: |
          echo "${{ secrets.SIGN_KEY }}" | base64 -d > keystore.jks

      - name: Set build type
        run: |
          if [ "${{ github.event.inputs.release_type }}" = "stable" ] || [ "${{ github.event.inputs.release_type }}" = "beta" ]; then
            echo "build_type=release" >> $GITHUB_ENV
          else
            echo "build_type=debug" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        if: env.build_type == 'release'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VERSION_CODE: ${{ github.run_number }}
        run: |
          ./gradlew :tv:assembleRelease --stacktrace --info
          ./gradlew tv:copyAndRenameOriginalReleaseApk
          ./gradlew tv:copyAndRenameDisguisedReleaseApk
          ./gradlew tv:copyAndRenameX5offlineReleaseApk

      - name: Build Debug APK
        if: env.build_type == 'debug'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VERSION_CODE: ${{ github.run_number }}
        run: |
          ./gradlew :tv:assembleDebug --warning-mode=all
          ./gradlew tv:copyAndRenameOriginalDebugApk
          ./gradlew tv:copyAndRenameDisguisedDebugApk
          ./gradlew tv:copyAndRenameX5offlineDebugApk

      - name: Move Metadata (Unify path)
        run: |
          if [ -f tv/build/outputs/apk/original/${{ env.build_type }}/output-metadata.json ]; then
            mkdir -p tv/build/outputs/apk/release
            mv tv/build/outputs/apk/original/${{ env.build_type }}/output-metadata.json tv/build/outputs/apk/release/output-metadata.json
          fi

      - name: Read apk output metadata
        id: apk-meta
        uses: juliangruber/read-file-action@v1
        with:
          path: tv/build/outputs/apk/release/output-metadata.json

      - name: Parse apk infos
        run: |
          echo "info_version_code=${{ fromJson(steps.apk-meta.outputs.content).elements[0].versionCode }}" >> $GITHUB_ENV
          echo "info_version_name=${{ fromJson(steps.apk-meta.outputs.content).elements[0].versionName }}" >> $GITHUB_ENV

      - name: Generate release title and gitee repo name
        run: |
          if [ "${{ github.event.inputs.release_type }}" = "stable" ]; then
            echo "release_title=V${{ env.info_version_name }} 稳定版本" >> $GITHUB_ENV
            echo "gitee_repo=mytvstable" >> $GITHUB_ENV
            echo "prerelease_flag=false" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.release_type }}" = "beta" ]; then
            echo "release_title=V${{ env.info_version_name }} 预览版本" >> $GITHUB_ENV
            echo "gitee_repo=mytvbeta" >> $GITHUB_ENV
            echo "prerelease_flag=true" >> $GITHUB_ENV
          else
            echo "release_title=V${{ env.info_version_name }} 开发版本" >> $GITHUB_ENV
            echo "gitee_repo=mytvdev" >> $GITHUB_ENV
            echo "prerelease_flag=true" >> $GITHUB_ENV
          fi

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tv/build/outputs/apk/release/*all*disguised.apk
            tv/build/outputs/apk/release/*original.apk
            tv/build/outputs/apk/release/*armeabi*x5offline.apk
            tv/build/outputs/apk/release/*arm64*x5offline.apk
          tag_name: V${{ env.info_version_name }}
          name: ${{ env.release_title }}
          body: ${{ env.changelog }}
          generate_release_notes: false
          prerelease: ${{ env.prerelease_flag }}
          make_latest: ${{ github.event.inputs.release_type == 'stable' }}

      # 可选：上传到 Gitee（保留原有逻辑，但确保只在主仓库运行）
      - name: Create Gitee Release
        if: github.repository == 'mytv-android/mytv-android' && secrets.GITEE_TOKEN != ''
        id: create_gitee_release
        uses: nicennnnnnnlee/action-gitee-release@v1.0.5
        with:
          gitee_owner: mytv-android
          gitee_repo: ${{ env.gitee_repo }}
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_tag_name: V${{ env.info_version_name }}
          gitee_release_name: ${{ env.release_title }}
          gitee_release_body: ${{ env.changelog }}
          gitee_target_commitish: master

      - name: Upload APKs to Gitee Release
        if: steps.create_gitee_release.outputs.release-id != ''
        uses: nicennnnnnnlee/action-gitee-release@v1.0.5
        with:
          gitee_owner: mytv-android
          gitee_repo: ${{ env.gitee_repo }}
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_release_id: ${{ steps.create_gitee_release.outputs.release-id }}
          gitee_upload_retry_times: 3
          gitee_files: |
            tv/build/outputs/apk/release/*armeabi-v7a*original.apk
            tv/build/outputs/apk/release/*arm64-v8a*original.apk
            tv/build/outputs/apk/release/*x86*original.apk
